server:
  port: 8080
  error:
    whitelabel:
      enabled: false
spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  h2:
    console.enabled: true
  datasource:
    username: sa
    password: password
    url: jdbc:h2:mem:adelaide_db
    driver-class-name: org.h2.Driver
  jpa:
    database: h2
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    user: sa
    password: password
    url: jdbc:h2:mem:adelaide_db