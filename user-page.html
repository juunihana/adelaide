<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-size: 1rem;
    }

    .root-header {
      position: fixed;
      display: flex;
      gap: 1rem;
      top: 0;
      border: solid 1px black;
      height: 50px;
      /*height: 3rem;*/
      width: 100vw;
      align-items: center;
    }

    .main-menu {
      display: flex;
      gap: 0.75rem;
    }

    .root-header-auth {
      display: flex;
      gap: 0.75rem;
      margin-left: auto;
    }

    .root-container {
      max-width: 80vw;
      margin: 80px auto;
      display: flex;
      gap: 4rem;
    }

    .side-container, .main-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .side-container {
      flex: 1;
    }

    .main-container {
      flex: 3;
    }

    .user-page-info, .user-page-friends, .user-page-groups, .user-page-photos, .user-page-posts-control, .user-page-post {
      border: solid 1px black;
      padding: 1rem;
    }

    .user-page-friends {
      border: solid 1px black;
    }

    .user-page-groups {
      border: solid 1px black;
    }

    .user-page-photos {
      border: solid 1px black;
    }

    .user-page-posts-control {
      border: solid 1px black;
    }

    .user-page-post {
      border: solid 1px black;
    }

  </style>
</head>
<body>
<header class="root-header">
  <div class="root-header-logo">Adelaide</div>
  <nav class="main-menu">
    <div class="main-menu-element">My page</div>
    <div class="main-menu-element">Feed</div>
    <div class="main-menu-element">Friends</div>
    <div class="main-menu-element">Groups</div>
    <div class="main-menu-element">Photos</div>
    <div class="main-menu-element">Music</div>
    <div class="main-menu-element">Videos</div>
  </nav>
  <div class="root-header-auth">
    <div class="root-header-auth-element">Sign in</div>
    <div class="root-header-auth-element">Sign up</div>
  </div>
</header>
<main class="root-container">
  <div class="side-container">
    <div class="user-page-info">
      User info
    </div>
    <div class="user-page-friends">
      User friends
    </div>
    <div class="user-page-groups">
      User groups
    </div>
  </div>
  <div class="main-container">
    <div class="user-page-photos">
      User photos
    </div>
    <div class="user-page-posts-control">
      User posts controls
    </div>
    <div class="user-page-post">
      User post
    </div>
  </div>
</main>
</body>
</html>
